name: Simulation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  # C++ shim path (FDB 7.1 / 7.3): no C ABI yet, so the workload is loaded via
  # the C++ shim (useCAPI=false), which must be built in the foundationdb/build
  # image. See foundationdb-simulation/README.md.
  simulation73:
    name: "Simulation 7.3 (C++ shim)"
    runs-on: ubuntu-latest
    steps:
      - name: disk space
        run: df -h /

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          overprovision-lvm: 'true'

      - name: disk space
        run: df -h /

      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: docker build
        run: docker build -t simulation . -f foundationdb-simulation/examples/atomic/Dockerfile

      - name: docker run
        run: docker run --rm simulation

  # C API path: requires fdbserver >= 7.4.6 (earlier 7.4.x ship an incompatible
  # C ABI and SIGSEGV at workload start, see #459). useCAPI=true is set in each
  # test file; a crash makes fdbserver exit non-zero and fails the job.
  simulation74:
    name: "Simulation 7.4 (C API) / ${{ matrix.example }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: foundationdb-simulation, example: atomic, test_file: test_file_74.toml }
          - { package: foundationdb-simulation, example: noop, test_file: test_file.toml }
          - { package: foundationdb-simulation, example: shared, test_file: test_file.toml }
          - { package: foundationdb-simulation-tracing, example: tracing_demo, test_file: test_tracing_demo.toml }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup FoundationDB
        uses: foundationdb-rs/foundationdb-actions-install@v2.3.0
        with:
          version: "7.4.6"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "stable"

      - name: Build ${{ matrix.example }} workload
        run: cargo build -p ${{ matrix.package }} --release --example ${{ matrix.example }} --features fdb-7_4

      - name: Test ${{ matrix.example }} workload
        run: fdbserver -r simulation -f ${{ matrix.package }}/examples/${{ matrix.example }}/${{ matrix.test_file }} -b on --trace-format json
