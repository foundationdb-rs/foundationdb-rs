name: Simulation

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  # ===========================================================================
  # C++ shim path (FoundationDB 7.1 / 7.3).
  #
  # These releases predate the external-workload *C* ABI, so the workload is
  # loaded through the C++ `ExternalWorkload` interface and the C->C++ shim in
  # `foundationdb-simulation/src/CppWorkload.cpp` (`useCAPI = false`). The C++
  # ABI is environment sensitive, so the shim MUST be built inside the official
  # `foundationdb/build` image (see foundationdb-simulation/README.md). This is
  # the job that exercises `CppWorkload.cpp` and its vtable wrappers.
  # ===========================================================================
  simulation73:
    name: "Simulation 7.3 (C++ shim)"
    runs-on: ubuntu-latest
    steps:
      - name: disk space
        run: df -h /

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          overprovision-lvm: 'true'

      - name: disk space
        run: df -h /

      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: docker build
        run: docker build -t simulation . -f foundationdb-simulation/examples/atomic/Dockerfile

      # The image's entrypoint runs the atomic workload over 20 randomized seeds
      # (with buggify) and fails on any non-zero fdbserver exit.
      - name: docker run
        run: docker run --rm simulation

  # ===========================================================================
  # C API path (FoundationDB 7.4.6+).
  #
  # The pure-C external-workload ABI (`api_version` + per-struct vtables +
  # `delay`) shipped in fdbserver 7.4.6. Earlier 7.4.x patch releases (<= 7.4.5)
  # ship the OLD flat-pointer ABI and are NOT compatible with this crate's
  # `useCAPI` path: they SIGSEGV at workload start (issue #459). Pin 7.4.6.
  #
  # No Docker is needed for the C path. Matrix over every bundled example (which
  # together cover both registration styles: `register_workload` and
  # `register_factory`) and run each across several deterministic seeds with
  # buggify on, so a single seed/path can't hide a regression.
  # ===========================================================================
  simulation74:
    name: "Simulation 7.4 (C API) / ${{ matrix.example }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [atomic, noop, shared]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Setup FoundationDB
        uses: foundationdb-rs/foundationdb-actions-install@v2.3.0
        with:
          # 7.4.6 is the first release with the new external-workload C ABI.
          version: "7.4.6"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "stable"

      - name: Build ${{ matrix.example }} workload
        run: cargo build -p foundationdb-simulation --release --example ${{ matrix.example }} --features fdb-7_4

      - name: Run ${{ matrix.example }} simulation (useCAPI, buggify, several seeds)
        shell: bash
        run: |
          set -uo pipefail
          case "${{ matrix.example }}" in
            atomic) test_file=test_file_74.toml ;;
            *)      test_file=test_file.toml ;;
          esac
          conf="foundationdb-simulation/examples/${{ matrix.example }}/${test_file}"
          status=0
          for seed in 1 2 3; do
            echo "::group::${{ matrix.example }} seed ${seed}"
            rm -f trace*.json
            if ! fdbserver -r simulation -f "${conf}" -b on -s "${seed}" --trace-format json 2>&1 | tee "sim-${seed}.log"; then
              echo "::error::simulation exited non-zero (${{ matrix.example }}, seed ${seed})"
              status=1
            fi
            if grep -qiE 'Segmentation fault|SIGNAL: Seg' "sim-${seed}.log"; then
              echo "::error::segfault detected (${{ matrix.example }}, seed ${seed})"
              status=1
            fi
            echo "::endgroup::"
            if [ "${status}" -ne 0 ]; then
              echo "Rust-side trace events:"
              grep -i Rust trace*.json 2>/dev/null || true
              break
            fi
          done
          exit "${status}"
